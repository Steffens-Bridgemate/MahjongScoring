<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tsumo! Scoring</title>
    <meta property="og:title" content="Tsumo! — Scores invoeren" />
    <meta property="og:description" content="Tik op de link om de eindscores voor je mahjongtafel in te voeren." />
    <meta property="og:type" content="website" />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Scoped CSS bundle — pulls in Tsump.Shared component styles (ScoreTable narrow/wide). -->
    <link href="Tsump.Scoring.styles.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script type="importmap"></script>
    <script>
        // GitHub Pages SPA decoder — restores the original route after 404.html bounced us
        // back to index.html with the path encoded as a query string.
        // Pair: see wwwroot/404.html.
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        })(window.location);
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.copyToClipboard = function (html, plainText) {
            var htmlBlob = new Blob([html], { type: 'text/html' });
            var textBlob = new Blob([plainText], { type: 'text/plain' });
            var item = new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob });
            return navigator.clipboard.write([item]);
        };
        window.copyTextToClipboard = function (plainText) {
            return navigator.clipboard.writeText(plainText);
        };
        window.copyQrImageToClipboard = async function (svgMarkup, qrSize, title, headerBg, headerFg) {
            // Renders an SVG string to a PNG on an offscreen canvas (with an optional
            // title band above the QR), then writes the result to the clipboard as
            // image/png. Must be called from a user-gesture handler.
            // Canvas size is read from the SVG viewBox attribute directly — relying on
            // img.naturalWidth is unreliable for viewBox-only SVGs across browsers.
            // headerBg/headerFg are optional — when set, the title band is filled with
            // headerBg and the title text is drawn in headerFg. This is how the organizer
            // (blue) and scoring app (green) QRs are visually distinguished in WhatsApp
            // now that on-QR overlays were dropped for hardware-scanner compatibility.
            if (!navigator.clipboard || !navigator.clipboard.write || !window.ClipboardItem) return false;
            try {
                var vbMatch = svgMarkup.match(/viewBox="0 0 (\d+)/);
                var size = vbMatch ? parseInt(vbMatch[1]) : qrSize;
                var titleHeight = title ? 56 : 0;

                var canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size + titleHeight;
                var ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, size, size + titleHeight);

                if (title) {
                    if (headerBg) {
                        ctx.fillStyle = headerBg;
                        ctx.fillRect(0, 0, size, titleHeight);
                        ctx.fillStyle = headerFg || 'white';
                    } else {
                        ctx.fillStyle = 'black';
                    }
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    var maxWidth = size * 0.9;
                    var fontSize = 28;
                    ctx.font = 'bold ' + fontSize + 'px sans-serif';
                    while (ctx.measureText(title).width > maxWidth && fontSize > 12) {
                        fontSize -= 1;
                        ctx.font = 'bold ' + fontSize + 'px sans-serif';
                    }
                    ctx.fillText(title, size / 2, titleHeight / 2);
                }

                var svgBlob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
                var url = URL.createObjectURL(svgBlob);
                try {
                    var img = new Image();
                    await new Promise(function (resolve, reject) {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = url;
                    });
                    ctx.drawImage(img, 0, titleHeight, size, size);
                } finally {
                    URL.revokeObjectURL(url);
                }

                var pngBlob = await new Promise(function (resolve) { canvas.toBlob(resolve, 'image/png'); });
                if (!pngBlob) return false;

                await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngBlob })]);
                return true;
            } catch (e) {
                console.warn('copyQrImageToClipboard failed:', e);
                return false;
            }
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(function (reg) {
                // When a new service worker takes over, reload so the page gets the
                // freshly cached assets instead of continuing with the old ones.
                var refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', function () {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }
    </script>
</body>

</html>
