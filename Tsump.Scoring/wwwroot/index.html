    <script type="importmap"></script>
    <script>
        // GitHub Pages SPA decoder — restores the original route after 404.html bounced us
        // back to index.html with the path encoded as a query string.
        // Pair: see wwwroot/404.html.
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        })(window.location);
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.copyToClipboard = function (html, plainText) {
            var htmlBlob = new Blob([html], { type: 'text/html' });
            var textBlob = new Blob([plainText], { type: 'text/plain' });
            var item = new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob });
            return navigator.clipboard.write([item]);
        };
        window.copyTextToClipboard = function (plainText) {
            return navigator.clipboard.writeText(plainText);
        };
        // Shared helper: renders a QR SVG (with optional title band above) to a PNG blob.
        // Used by both the clipboard-copy and save-as-file paths so the rasterisation
        // stays consistent. Canvas size is read from the SVG viewBox directly —
        // img.naturalWidth is unreliable for viewBox-only SVGs across browsers.
        async function renderQrToPngBlob(svgMarkup, qrSize, title, headerBg, headerFg) {
            var vbMatch = svgMarkup.match(/viewBox="0 0 (\d+)/);
            var size = vbMatch ? parseInt(vbMatch[1]) : qrSize;
            var titleHeight = title ? 56 : 0;

            var canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size + titleHeight;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, size, size + titleHeight);

            if (title) {
                if (headerBg) {
                    ctx.fillStyle = headerBg;
                    ctx.fillRect(0, 0, size, titleHeight);
                    ctx.fillStyle = headerFg || 'white';
                } else {
                    ctx.fillStyle = 'black';
                }
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                var maxWidth = size * 0.9;
                var fontSize = 28;
                ctx.font = 'bold ' + fontSize + 'px sans-serif';
                while (ctx.measureText(title).width > maxWidth && fontSize > 12) {
                    fontSize -= 1;
                    ctx.font = 'bold ' + fontSize + 'px sans-serif';
                }
                ctx.fillText(title, size / 2, titleHeight / 2);
            }

            var svgBlob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
            var url = URL.createObjectURL(svgBlob);
            try {
                var img = new Image();
                await new Promise(function (resolve, reject) {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = url;
                });
                ctx.drawImage(img, 0, titleHeight, size, size);
            } finally {
                URL.revokeObjectURL(url);
            }

            return await new Promise(function (resolve) { canvas.toBlob(resolve, 'image/png'); });
        }

        window.copyQrImageToClipboard = async function (svgMarkup, qrSize, title, headerBg, headerFg) {
            // Writes the rasterised QR PNG to the clipboard. Must be called from a
            // user-gesture handler. headerBg/headerFg colour the title band so the
            // organizer (blue) and scoring app (green) QRs are visually distinguishable
            // in WhatsApp now that on-QR overlays were dropped for scanner compatibility.
            if (!navigator.clipboard || !navigator.clipboard.write || !window.ClipboardItem) return false;
            try {
                var pngBlob = await renderQrToPngBlob(svgMarkup, qrSize, title, headerBg, headerFg);
                if (!pngBlob) return false;
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngBlob })]);
                return true;
            } catch (e) {
                console.warn('copyQrImageToClipboard failed:', e);
                return false;
            }
        };

        window.downloadQrAsPng = async function (svgMarkup, qrSize, title, headerBg, headerFg, filename) {
            // Triggers a browser download of the rasterised QR PNG. Same rendering as
            // the clipboard path; differs only in delivery (anchor + .click() instead of
            // clipboard.write). The user's browser handles the actual file-picker UX.
            try {
                var pngBlob = await renderQrToPngBlob(svgMarkup, qrSize, title, headerBg, headerFg);
                if (!pngBlob) return false;
                var pngUrl = URL.createObjectURL(pngBlob);
                var a = document.createElement('a');
                a.href = pngUrl;
                a.download = filename || 'qrcode.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(pngUrl);
                return true;
            } catch (e) {
                console.warn('downloadQrAsPng failed:', e);
                return false;
            }
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Restart-to-update PWA flow: a new version installs quietly and WAITS — it is never
        // activated in place, so the running app is never reloaded mid-action. The new version
        // takes effect the next time the app is launched fresh. The AppUpdateBanner just informs
        // the user and offers a best-effort "close now" to help on devices that stay open forever.
        (function () {
            if (!('serviceWorker' in navigator)) return;

            var dotNetRef = null;      // the Blazor AppUpdateBanner, once it registers
            var updatePending = false; // an update was detected (maybe before the banner mounted)

            window.registerAppUpdateCallback = function (ref) {
                dotNetRef = ref;
                if (updatePending) notifyBanner();
            };

            // Best-effort close so the waiting worker can activate on next launch. Resolves false
            // only if the window is still here shortly after (close blocked — common on mobile);
            // if it actually closed, the promise never resolves because the page is gone.
            window.closeAppForUpdate = function () {
                try { window.close(); } catch (e) { /* ignore */ }
                return new Promise(function (resolve) { setTimeout(function () { resolve(false); }, 700); });
            };

            function notifyBanner() {
                updatePending = true;
                if (dotNetRef) {
                    try { dotNetRef.invokeMethodAsync('OnUpdateAvailable'); } catch (e) { /* banner not mounted */ }
                }
            }

            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(function (reg) {
                function watch(worker) {
                    if (!worker) return;
                    worker.addEventListener('statechange', function () {
                        // 'installed' while a controller already exists ⇒ an UPDATE, not first install.
                        if (worker.state === 'installed' && navigator.serviceWorker.controller) notifyBanner();
                    });
                }

                if (reg.waiting && navigator.serviceWorker.controller) notifyBanner();
                watch(reg.installing);
                reg.addEventListener('updatefound', function () { watch(reg.installing); });

                // Check for a new deploy whenever the user returns to the app.
                window.addEventListener('focus', function () { reg.update().catch(function () { }); });
            }).catch(function (e) { console.warn('Service worker registration failed:', e); });
        })();
    </script>
</body>
