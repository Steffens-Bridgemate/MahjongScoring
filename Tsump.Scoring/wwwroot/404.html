<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Tsumo! Scoring</title>
    <script>
        // GitHub Pages SPA redirect: converts the path to a query string
        // so index.html can pick it up and restore the route.
        // The matching decoder runs early in index.html.
        var pathSegmentsToKeep = 1; // keep /MahjongScoring/
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body></body>
</html>
