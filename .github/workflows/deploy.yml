name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pulls the external/MahjongIndeler submodule that provides Tsump.Shared.
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish Tsump.Scoring/Tsump.Scoring.csproj -c Release -o release -p:InformationalVersion="1.${{ github.run_number }}"

      - name: Set base path for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/MahjongScoring/" />|' release/wwwroot/index.html
          sed -i 's|</body>|<div class="build-version">1.${{ github.run_number }}</div>\n</body>|' release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
